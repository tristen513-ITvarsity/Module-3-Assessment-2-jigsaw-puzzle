<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigsaw Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="javascript/api.js"></script>
    <script type="text/javascript" src="javascript/puzzle.js" defer></script>
</head>
<body>
    <main class="page">
        <section class="board-panel">
            <div class="puzzle-board" aria-label="3 by 3 jigsaw board">
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid1-1" alt="Puzzle slot 1 1"/>
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid1-2" alt="Puzzle slot 1 2"/>
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid1-3" alt="Puzzle slot 1 3"/>
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid2-1" alt="Puzzle slot 2 1"/>
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid2-2" alt="Puzzle slot 2 2"/>
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid2-3" alt="Puzzle slot 2 3"/>
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid3-1" alt="Puzzle slot 3 1"/>
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid3-2" alt="Puzzle slot 3 2"/>
                <img src="images/puzzle-grid.png" class="puzzle-grid-drop" id="grid3-3" alt="Puzzle slot 3 3"/>
            </div>
        </section>

        <section class="pieces-panel">
            <div class="piece-tray" aria-label="Draggable puzzle pieces">
                <img src="images/img1-1.png" class="puzzle-piece" id="img1-1-draggable" alt="Puzzle piece 1 1"/>
                <img src="images/img1-2.png" class="puzzle-piece" id="img1-2-draggable" alt="Puzzle piece 1 2"/>
                <img src="images/img1-3.png" class="puzzle-piece" id="img1-3-draggable" alt="Puzzle piece 1 3"/>
                <img src="images/img2-1.png" class="puzzle-piece" id="img2-1-draggable" alt="Puzzle piece 2 1"/>
                <img src="images/img2-2.png" class="puzzle-piece" id="img2-2-draggable" alt="Puzzle piece 2 2"/>
                <img src="images/img2-3.png" class="puzzle-piece" id="img2-3-draggable" alt="Puzzle piece 2 3"/>
                <img src="images/img3-1.png" class="puzzle-piece" id="img3-1-draggable" alt="Puzzle piece 3 1"/>
                <img src="images/img3-2.png" class="puzzle-piece" id="img3-2-draggable" alt="Puzzle piece 3 2"/>
                <img src="images/img3-3.png" class="puzzle-piece" id="img3-3-draggable" alt="Puzzle piece 3 3"/>
            </div>
            <p id="status-message" class="status-message" aria-hidden="true"></p>
        </section>
    </main>
</body>
</html>
